# Render.com — deploy automático (ver deploy/COMECE_AQUI.txt)
services:
  - type: web
    name: futebol-betting-brain
    runtime: docker
    plan: free
    region: frankfurt
    repo: https://github.com/pedromja/futebol-betting-brain
    branch: main
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PUBLIC_SITE_URL
        value: https://futebol-betting-brain.onrender.com
      - key: DATA_DIR
        value: /var/data
      - key: AUTH_ENABLED
        value: "1"
      - key: AUTH_USERNAME
        value: admin
      - key: AUTH_PASSWORD
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: AUTH_ADMIN2_USERNAME
        value: pedromja
      - key: AUTH_ADMIN2_PASSWORD
        sync: false
      - key: API_FOOTBALL_KEY
        sync: false
      - key: FOOTBALL_DATA_API_KEY
        sync: false
      - key: OPENWEATHERMAP_API_KEY
        sync: false
    # Disco persistente (Render) — descomenta para histórico sobreviver a redeploys:
    # disk:
    #   name: futebol-data
    #   mountPath: /var/data
    #   sizeGB: 1